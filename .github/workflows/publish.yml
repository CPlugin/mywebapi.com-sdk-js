name: Publish to npm

# * Triggered by pushing a version tag (e.g. v0.1.0, v1.2.3).
# * Uses npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN, nothing to rotate.
# * One-time setup on npmjs.com (after the package exists, see note below):
# *   Package → Settings → Trusted Publisher → GitHub Actions →
# *   set org/repo and workflow filename "publish.yml". Publishes then need no secret.
# * ! First-ever publish bootstrap: npm requires the package to exist before a
# *   Trusted Publisher can be attached. Do ONE initial publish (a short-lived
# *   automation token, or `npm publish` from your machine), then configure the
# *   Trusted Publisher and every later release publishes via OIDC with zero secrets.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # * Required for npm provenance attestation (--provenance flag).
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # * npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # * No NODE_AUTH_TOKEN: npm detects the configured Trusted Publisher and
      #   authenticates via the workflow's OIDC id-token. Provenance is automatic.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --provenance
