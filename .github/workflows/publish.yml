name: Publish to npm

# * Triggered by pushing a version tag (e.g. v0.1.0, v1.2.3).
# * Prerequisites:
# *   - Finalize the package name and scope in package.json before the first publish.
# *   - Add an NPM_TOKEN repository secret (Settings → Secrets and variables → Actions).
# *     Generate it at https://www.npmjs.com/settings/<user>/tokens (type: Automation).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # * Required for npm provenance attestation (--provenance flag).
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
