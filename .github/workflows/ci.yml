name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Run tests
        # * E2E tests require a live WebAPI instance (WEBAPI_E2E=1). They are
        #   skipped automatically when the env variable is absent, so unit tests
        #   run cleanly in CI without any additional setup.
        run: bun test
